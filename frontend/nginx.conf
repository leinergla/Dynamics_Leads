server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de la API al contenedor 'api' (misma red de docker-compose).
    # Mantiene todo en el mismo origen: la cookie httpOnly funciona sin CORS.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # SPA: cualquier ruta desconocida sirve index.html (enrutado de React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de los assets con hash en el nombre.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
